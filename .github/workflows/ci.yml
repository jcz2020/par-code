name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-15]
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5.4.0
          dune-cache: true
          cache-prefix: v2-par067
      # PAR SDK is not yet on the public opam repo — pin it from source.
      - name: Pin PAR SDK
        run: opam pin add par https://github.com/jcz2020/par.git -y
      - name: Install dependencies
        run: opam install . --deps-only --with-test
      - name: Build
        run: opam exec -- dune build
      - name: Test
        run: opam exec -- dune runtest
